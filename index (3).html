<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isaac Pro - Elite Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --bg-card: #1a1a1a;
            --gold: #e2b007;
            --isaac-color: #0088ff;
            --colab-color: #ff4400;
            --occupied: #d32f2f;
            --free: #2a2a2a;
            --text-gray: #a0a0a0;
            --text-light: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); display: flex; height: 100vh; overflow: hidden; }

        nav { width: 70px; background-color: #000; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid #222; }
        .nav-item { color: var(--text-gray); font-size: 20px; margin-bottom: 35px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); }

        main { flex: 1; padding: 15px; overflow-y: auto; position: relative; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .brand { font-weight: 900; letter-spacing: 2px; font-size: 20px; }
        .brand span { color: var(--gold); }

        .balance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .b-card { background: var(--bg-card); padding: 12px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .b-card small { font-size: 9px; text-transform: uppercase; color: var(--text-gray); }
        .b-card p { font-size: 14px; font-weight: bold; margin-top: 5px; }

        .section-title { font-size: 14px; color: var(--gold); margin: 15px 0 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* Grade de Horários */
        .agenda-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 30px; }
        .barber-title { text-align: center; font-size: 11px; font-weight: bold; color: var(--text-light); margin-bottom: 10px; background: #222; padding: 5px; border-radius: 4px; }
        
        .time-slot { 
            background: var(--free); 
            margin-bottom: 6px; 
            padding: 12px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .time-slot.occupied { background: var(--occupied); }
        .time-slot span { font-size: 12px; font-weight: bold; }
        .time-slot b { font-size: 11px; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Histórico */
        .history-item { background: var(--bg-card); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--gold); }
        .history-info { font-size: 13px; }
        .history-info b { color: var(--gold); }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-body { background: var(--bg-card); width: 90%; max-width: 350px; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; }
        .save-btn { background: var(--gold); color: black; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }

        .btn-clear { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 10px; width: 100%; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; }

        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-calendar-alt"></i></div>
        <div class="nav-item" onclick="showPage('history-page')"><i class="fas fa-history"></i></div>
    </nav>

    <main>
        <div id="home" class="page active">
            <header><h1 class="brand">ISAAC <span>PRO</span></h1></header>

            <div class="balance-grid">
                <div class="b-card"><small>Isaac</small><p id="saldoIsaac" style="color:var(--isaac-color)">R$ 0,00</p></div>
                <div class="b-card"><small>Colab.</small><p id="saldoFunc" style="color:var(--colab-color)">R$ 0,00</p></div>
                <div class="b-card"><small>Total</small><p id="saldoTotal">R$ 0,00</p></div>
            </div>

            <div class="agenda-container">
                <div>
                    <div class="barber-title">ISAAC</div>
                    <div id="grid-isaac"></div>
                </div>
                <div>
                    <div class="barber-title">COLABORADOR</div>
                    <div id="grid-colab"></div>
                </div>
            </div>
        </div>

        <div id="history-page" class="page">
            <header><h1>Histórico <span>Geral</span></h1></header>
            <div id="listaHistorico"></div>
            <button class="btn-clear" onclick="limparManual()">ZERAR HISTÓRICO MANUALMENTE</button>
            <p style="font-size: 10px; color: var(--text-gray); text-align: center; margin-top: 10px;">* O sistema reseta automaticamente todo domingo.</p>
        </div>
    </main>

    <div id="modal">
        <div class="modal-body">
            <h3 style="color:var(--gold)">Agendar</h3>
            <p id="labelHorario" style="font-size:11px; color:var(--text-gray); margin-bottom:10px"></p>
            <input type="text" id="nomeCli" placeholder="Nome do Cliente">
            <select id="tipoServ">
                <option value="Corte">Corte</option>
                <option value="Barba">Barba</option>
                <option value="Corte + Barba">Corte + Barba</option>
            </select>
            <input type="number" id="valorServ" placeholder="Valor (R$)">
            <button class="save-btn" onclick="confirmarAgendamento()">RESERVAR</button>
            <button onclick="fecharModal()" style="width:100%; background:transparent; color:white; border:none; margin-top:15px">Voltar</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('isaacPro_vAutoReset_db')) || [];
        let tempH = "", tempB = "";

        // Gerar Horários: 08:00 até 22:00
        const horarios = [];
        for(let h=8; h<=21; h++){
            horarios.push(`${h.toString().padStart(2, '0')}:00`);
            horarios.push(`${h.toString().padStart(2, '0')}:30`);
        }
        horarios.push("22:00");

        // VERIFICAÇÃO DE DOMINGO (AUTO-RESET)
        function verificarResetSemanal() {
            const hoje = new Date();
            const diaSemana = hoje.getDay(); // 0 é Domingo
            const ultimaLimpeza = localStorage.getItem('isaacPro_ultimaLimpeza');
            const dataHoje = hoje.toDateString();

            if (diaSemana === 0 && ultimaLimpeza !== dataHoje) {
                db = [];
                localStorage.setItem('isaacPro_vAutoReset_db', JSON.stringify(db));
                localStorage.setItem('isaacPro_ultimaLimpeza', dataHoje);
                alert("Bom domingo! O histórico semanal foi resetado automaticamente.");
            }
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
            render();
        }

        function openModal(hora, barbeiro) {
            const ocupado = db.find(i => i.hora === hora && i.barbeiro === barbeiro);
            if(ocupado) {
                if(confirm(`Cliente: ${ocupado.cliente}\nValor: R$ ${ocupado.valor}\n\nDeseja apagar este registro?`)) {
                    db = db.filter(i => i.id !== ocupado.id);
                    atualizar();
                }
                return;
            }
            tempH = hora; tempB = barbeiro;
            document.getElementById('labelHorario').innerText = `Horário: ${hora} | Profissional: ${barbeiro.toUpperCase()}`;
            document.getElementById('modal').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        function confirmarAgendamento() {
            const nome = document.getElementById('nomeCli').value.toUpperCase();
            const valor = document.getElementById('valorServ').value;
            const serv = document.getElementById('tipoServ').value;
            if(!nome || !valor) return alert("Preencha tudo!");

            db.push({
                id: Date.now(),
                cliente: nome,
                valor: parseFloat(valor),
                hora: tempH,
                barbeiro: tempB,
                servico: serv,
                data: new Date().toLocaleDateString('pt-BR')
            });

            document.getElementById('nomeCli').value = "";
            document.getElementById('valorServ').value = "";
            fecharModal();
            atualizar();
        }

        function atualizar() {
            localStorage.setItem('isaacPro_vAutoReset_db', JSON.stringify(db));
            render();
        }

        function limparManual() {
            if(confirm("Deseja apagar TODO o histórico agora?")) {
                db = [];
                atualizar();
            }
        }

        function render() {
            const gIsaac = document.getElementById('grid-isaac');
            const gColab = document.getElementById('grid-colab');
            const lHist = document.getElementById('listaHistorico');
            gIsaac.innerHTML = ''; gColab.innerHTML = ''; lHist.innerHTML = '';
            
            let sIsaac = 0, sColab = 0;

            // Renderiza Grades
            horarios.forEach(h => {
                const oi = db.find(i => i.hora === h && i.barbeiro === 'isaac');
                const oc = db.find(i => i.hora === h && i.barbeiro === 'colab');

                gIsaac.innerHTML += `<div class="time-slot ${oi?'occupied':''}" onclick="openModal('${h}','isaac')"><span>${h}</span><b>${oi?oi.cliente:'LIVRE'}</b></div>`;
                gColab.innerHTML += `<div class="time-slot ${oc?'occupied':''}" onclick="openModal('${h}','colab')"><span>${h}</span><b>${oc?oc.cliente:'LIVRE'}</b></div>`;
                
                if(oi) sIsaac += oi.valor;
                if(oc) sColab += oc.valor;
            });

            // Renderiza Histórico na aba específica
            db.sort((a,b) => b.id - a.id).forEach(item => {
                lHist.innerHTML += `
                    <div class="history-item">
                        <div class="history-info">
                            <span>${item.data} - ${item.hora}</span><br>
                            <b>${item.cliente}</b> (${item.barbeiro === 'isaac' ? 'Isaac' : 'Colab'})
                        </div>
                        <div style="font-weight:bold">R$ ${item.valor.toFixed(2)}</div>
                    </div>
                `;
            });

            document.getElementById('saldoIsaac').innerText = `R$ ${sIsaac.toFixed(2)}`;
            document.getElementById('saldoFunc').innerText = `R$ ${sColab.toFixed(2)}`;
            document.getElementById('saldoTotal').innerText = `R$ ${(sIsaac + sColab).toFixed(2)}`;
        }

        // Inicia verificando o reset e renderizando
        verificarResetSemanal();
        render();
    </script>
</body>
</html>
